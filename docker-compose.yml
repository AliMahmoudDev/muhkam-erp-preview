version: '3.9'

# MUHKAM ERP — Docker Compose
# ULTIMATE: halaltec.com/
# ADVANCED: halaltec.com/muhkam-base/
# API:      halaltec.com/api/

services:
  postgres:
    image: postgres:16-alpine
    container_name: muhkam-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: erpuser
      POSTGRES_PASSWORD: ${DB_PASSWORD:-localpassword}
      POSTGRES_DB: erp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erpuser -d erp"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: artifacts/api-server/Dockerfile
    container_name: muhkam-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://erpuser:${DB_PASSWORD:-localpassword}@postgres:5432/erp
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      PORT: 3000
      NODE_ENV: production
      ALLOWED_ORIGINS: https://halaltec.com
      BACKUP_DIR: /app/backups
    volumes:
      - api_backups:/app/backups
      # ULTIMATE frontend static files
      - ./artifacts/erp-system/dist/public:/app/erp-system/dist/public:ro
      # ADVANCED frontend static files
      - ./artifacts/muhkam-base/dist/public:/app/muhkam-base/dist/public:ro
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: muhkam-nginx
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/sites-available/muhkam:ro
      - nginx_certs:/etc/letsencrypt:ro

volumes:
  postgres_data:
  api_backups:
  nginx_certs:
