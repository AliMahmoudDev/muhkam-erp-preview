# ─────────────────────────────────────────────────────────────────────────────
# Nginx configuration — MUHKAM ERP (Multi-Edition: ULTIMATE + ADVANCED)
# Replace 'yourdomain.com' with your actual domain
#
# Place at: /etc/nginx/sites-available/muhkam
# Enable:   sudo ln -s /etc/nginx/sites-available/muhkam /etc/nginx/sites-enabled/
# Test:     sudo nginx -t
# Reload:   sudo nginx -s reload
#
# Architecture:
#   yourdomain.com/             → MUHKAM ULTIMATE  (full accounting)
#   yourdomain.com/muhkam-base/ → MUHKAM ADVANCED  (simplified)
#   yourdomain.com/api/         → Express REST API (shared backend)
# ─────────────────────────────────────────────────────────────────────────────

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # ── SSL — generate with: certbot --nginx -d yourdomain.com ──────────────
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/yourdomain.com/chain.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml+rss application/atom+xml image/svg+xml;
    gzip_min_length 1024;

    # ── Body size limit ──────────────────────────────────────────────────────
    client_max_body_size 10M;

    # ── WebSocket upgrade mapping ────────────────────────────────────────────
    map $http_upgrade $connection_upgrade {
        default   upgrade;
        ""        close;
        ~*^h2c$   close;
    }

    # ── Common proxy settings ────────────────────────────────────────────────
    proxy_http_version 1.1;
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        $connection_upgrade;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
    proxy_read_timeout 60s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;

    # ── Static assets: ULTIMATE — long-term caching (hashed filenames) ───────
    location ^~ /assets/ {
        root /var/www/muhkam/artifacts/erp-system/dist/public;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Static assets: ADVANCED — long-term caching ──────────────────────────
    location ^~ /muhkam-base/assets/ {
        alias /var/www/muhkam/artifacts/muhkam-base/dist/public/assets/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── All other requests → Express backend (handles both editions + API) ───
    location / {
        proxy_pass http://127.0.0.1:3000;
    }

    # ── Logs ─────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/muhkam-access.log;
    error_log  /var/log/nginx/muhkam-error.log warn;
}
