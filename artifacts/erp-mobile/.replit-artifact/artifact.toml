kind = "mobile"
previewPath = "/erp-mobile/"
title = "ERP Mobile"
version = "1.0.0"
id = "artifacts/erp-mobile"
router = "path"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
name = "expo"
paths = [ "/erp-mobile/" ]
localPort = 8099

[services.development]
run = "pnpm --filter @workspace/erp-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/erp-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/erp-mobile", "run", "serve" ]

[services.env]
PORT = "8099"
METRO_PORT = "8082"
BASE_PATH = "/erp-mobile/"
