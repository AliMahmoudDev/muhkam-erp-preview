name: Generate Drizzle Snapshot

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate-snapshot:
    name: Generate Initial Migration Snapshot
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
      JWT_SECRET: ci-snapshot-jwt-secret-minimum-32chars!!
      JWT_REFRESH_SECRET: ci-snapshot-refresh-secret-min-32chars!!

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Drizzle migration snapshot
        run: pnpm --filter @workspace/db run generate

      - name: Verify output exists
        run: |
          if [ ! -d "lib/db/drizzle" ]; then
            echo "ERROR: lib/db/drizzle was not created"
            exit 1
          fi
          echo "Generated files:"
          find lib/db/drizzle -type f | sort

      - name: Scan for dangerous SQL
        run: |
          DANGEROUS=""
          if grep -rn "DROP TABLE" lib/db/drizzle/; then DANGEROUS="DROP_TABLE"; fi
          if grep -rn "DROP COLUMN" lib/db/drizzle/; then DANGEROUS="$DANGEROUS DROP_COLUMN"; fi
          if grep -rn "TRUNCATE" lib/db/drizzle/; then DANGEROUS="$DANGEROUS TRUNCATE"; fi
          if grep -rn "DELETE FROM" lib/db/drizzle/; then DANGEROUS="$DANGEROUS DELETE_FROM"; fi
          if [ -n "$DANGEROUS" ]; then
            echo "FATAL: Dangerous SQL detected: $DANGEROUS"
            echo "Snapshot will NOT be committed."
            exit 1
          fi
          echo "OK — no dangerous statements found"

      # Husky hooks are disabled here because CI validates generated PRs
      # separately, and this workflow should only generate the snapshot PR.
      - name: Create branch and commit
        env:
          HUSKY: "0"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="chore/generated-initial-drizzle-snapshot"
          git push origin --delete "$BRANCH" 2>/dev/null || true
          git checkout -b "$BRANCH"
          git add lib/db/drizzle/
          git commit --no-verify -m "chore: generate initial drizzle migration snapshot

          Generated from current TypeScript schema using drizzle-kit generate.
          Not applied to any database. Must be reviewed before merge.
          Dangerous SQL scan: PASSED"
          git push --no-verify origin "$BRANCH"

      - name: Open Pull Request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --base main \
            --head "chore/generated-initial-drizzle-snapshot" \
            --title "chore: generate initial drizzle migration snapshot" \
            --body "## Initial Drizzle Migration Snapshot

          - Generated from current TypeScript schema using drizzle-kit generate
          - **Not applied to any database**
          - **Must be reviewed before merge**
          - **Must not be blindly applied to an existing production database**
          - Dangerous SQL scan: **PASSED**

          ### Safety
          - Safe for **empty databases** only
          - For existing production databases: mark as already-applied without executing"
