name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration-test:
    name: Multi-Tenant Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Push database schema to test DB
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
        run: pnpm --filter @workspace/db run push-force

      - name: Run multi-tenant isolation tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
          JWT_SECRET: ${{ secrets.INTEGRATION_JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.INTEGRATION_JWT_REFRESH_SECRET }}
          NODE_ENV: test
        run: pnpm --filter @workspace/api-server run test:integration

  deploy:
    name: Deploy to Hetzner VPS
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [integration-test]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          command_timeout: 15m
          script: |
            set -euo pipefail
            APP_DIR=/var/www/muhkam-erp
            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main
            git clean -fd
            pnpm install --frozen-lockfile
            cd "$APP_DIR/artifacts/muhkam-base"
            NODE_ENV=production BASE_PATH=/ VITE_API_URL="" pnpm run build
            cd "$APP_DIR/artifacts/erp-system"
            NODE_ENV=production BASE_PATH=/advanced/ pnpm run build
            cd "$APP_DIR/artifacts/api-server"
            pnpm run build
            if pm2 describe muhkam-api > /dev/null 2>&1; then
              pm2 restart muhkam-api --update-env
            else
              pm2 start dist/index.mjs --name muhkam-api --cwd "$APP_DIR/artifacts/api-server" --update-env
            fi
            pm2 save
            sudo cp "$APP_DIR/deploy/nginx.conf" /etc/nginx/sites-available/muhkam
            sudo nginx -t && sudo nginx -s reload
            sleep 8
            curl -sf http://localhost:3000/api/healthz
            echo "Deploy complete — halaltec.com is live"

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          command_timeout: 30s
          script: |
            RESPONSE=$(curl -sf http://localhost:3000/api/healthz)
            echo "OK — $RESPONSE — halaltec.com is live!"
