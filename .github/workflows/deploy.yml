name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Integration Tests ─────────────────────────────────────────────────────
  # Runs the real-DB multi-tenant isolation tests against a fresh Postgres
  # service container. Deploy is blocked until every test passes.
  integration-test:
    name: Multi-Tenant Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Push database schema to test DB
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
        # push-force skips interactive confirmation — safe for a fresh container
        run: pnpm --filter @workspace/db run push-force

      - name: Run multi-tenant isolation tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
          # JWT secrets are also set by vitest setupFiles (integration/setup.ts)
          # but setting them here ensures they are visible to any early imports.
          JWT_SECRET: integration-test-jwt-secret-minimum-32chars!!
          JWT_REFRESH_SECRET: integration-test-jwt-refresh-secret-min-32chars!!
          NODE_ENV: test
        run: pnpm --filter @workspace/api-server run test:integration

  # ── Deploy ────────────────────────────────────────────────────────────────
  # Only runs when all integration tests pass.
  deploy:
    name: Deploy to Hetzner VPS
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [integration-test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          command_timeout: 15m
          envs: VPS_DATABASE_URL,VPS_REDIS_URL,VPS_JWT_SECRET,VPS_JWT_REFRESH_SECRET
          script: |
            set -euo pipefail

            # ── 1. Pull latest code ────────────────────────────────────────────
            cd /root/Schema-Sync
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            # ── 2. Export all required secrets into environment ────────────────
            export DATABASE_URL="$VPS_DATABASE_URL"
            export REDIS_URL="$VPS_REDIS_URL"
            export JWT_SECRET="$VPS_JWT_SECRET"
            export JWT_REFRESH_SECRET="$VPS_JWT_REFRESH_SECRET"
            export NODE_ENV=production

            # ── 3. Install dependencies ────────────────────────────────────────
            pnpm install --frozen-lockfile

            # ── 4. DB integrity repair (idempotent — safe on every deploy) ──────
            echo "Running DB repair script..."
            psql "$DATABASE_URL" -f /root/Schema-Sync/scripts/db-repair.sql

            # ── 5. Push schema migrations ──────────────────────────────────────
            echo "Running drizzle push..."
            cd /root/Schema-Sync/lib/db
            pnpm run push

            # ── 6. Build frontend ──────────────────────────────────────────────
            echo "Building frontend..."
            cd /root/Schema-Sync/artifacts/erp-system
            NODE_ENV=production BASE_PATH=/ VITE_API_URL="" pnpm run build

            # ── 7. Build API server ────────────────────────────────────────────
            echo "Building API server..."
            cd /root/Schema-Sync/artifacts/api-server
            pnpm run build

            # ── 8. Write pm2 ecosystem config with updated env vars ────────────
            cat > /root/Schema-Sync/ecosystem.config.cjs << ECOSYSTEM
            module.exports = {
              apps: [{
                name: 'halaltech-api',
                script: './artifacts/api-server/dist/index.mjs',
                cwd: '/root/Schema-Sync',
                instances: 1,
                autorestart: true,
                watch: false,
                max_memory_restart: '512M',
                env: {
                  NODE_ENV: 'production',
                  DATABASE_URL: '${DATABASE_URL}',
                  REDIS_URL: '${REDIS_URL}',
                  JWT_SECRET: '${JWT_SECRET}',
                  JWT_REFRESH_SECRET: '${JWT_REFRESH_SECRET}',
                  PORT: '8080',
                }
              }]
            };
            ECOSYSTEM

            # ── 9. Reload / start pm2 with updated env ─────────────────────────
            echo "Reloading pm2..."
            pm2 startOrReload /root/Schema-Sync/ecosystem.config.cjs --update-env

            # ── 10. Health check (up to 60 s) ──────────────────────────────────
            echo "Waiting for health check..."
            MAX_ATTEMPTS=24
            ATTEMPT=0
            until curl -sf http://localhost:8080/api/healthz > /dev/null 2>&1; do
              ATTEMPT=$((ATTEMPT + 1))
              if [ "$ATTEMPT" -ge "$MAX_ATTEMPTS" ]; then
                echo "Health check failed after ${MAX_ATTEMPTS} attempts"
                pm2 logs halaltech-api --lines 50 --nostream || true
                exit 1
              fi
              sleep 2.5
            done

            pm2 status
            echo "Deploy complete — halaltech-api is live"

        env:
          VPS_DATABASE_URL: ${{ secrets.VPS_DATABASE_URL }}
          VPS_REDIS_URL: ${{ secrets.VPS_REDIS_URL }}
          VPS_JWT_SECRET: ${{ secrets.VPS_JWT_SECRET }}
          VPS_JWT_REFRESH_SECRET: ${{ secrets.VPS_JWT_REFRESH_SECRET }}

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          command_timeout: 30s
          script: |
            set -euo pipefail
            RESPONSE=$(curl -sf http://localhost:8080/api/healthz 2>&1) || {
              pm2 logs halaltech-api --lines 20 --nostream || true
              exit 1
            }
            STATUS=$(echo "$RESPONSE" | grep -o '"status":"[^"]*"' | cut -d'"' -f4)
            if [ "$STATUS" = "unhealthy" ]; then
              pm2 logs halaltech-api --lines 20 --nostream || true
              exit 1
            fi
            echo "OK — $STATUS — halaltec.com is live!"
