name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration-test:
    name: Multi-Tenant Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Push database schema to test DB
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
        run: pnpm --filter @workspace/db run push-force

      - name: Run multi-tenant isolation tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
          JWT_SECRET: ci-integration-test-jwt-secret-minimum-32chars!!
          JWT_REFRESH_SECRET: ci-integration-test-jwt-refresh-secret-min-32chars!!
          NODE_ENV: test
        run: pnpm --filter @workspace/api-server run test:integration

  deploy:
    name: Deploy to Hetzner VPS
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [integration-test]
    if: |
      always() &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule') &&
      (needs.integration-test.result == 'success' || github.event_name == 'workflow_dispatch')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          command_timeout: 15m
          envs: DEPLOY_TOKEN
          script: |
            set -euo pipefail
            APP_DIR=/var/www/muhkam-erp
            cd "$APP_DIR"

            # Load environment variables (DATABASE_URL, JWT_SECRET, etc.)
            if [ -f "$APP_DIR/.env" ]; then
              set -a
              source "$APP_DIR/.env"
              # التحقق من وجود المتغيرات المطلوبة
              : "${JWT_SECRET:?خطأ: JWT_SECRET غير موجود في ملف .env}"
              : "${JWT_REFRESH_SECRET:?خطأ: JWT_REFRESH_SECRET غير موجود في ملف .env}"
              : "${DATABASE_URL:?خطأ: DATABASE_URL غير موجود في ملف .env}"
              set +a
            fi

            # Authenticate git with token (GitHub no longer accepts passwords)
            git remote set-url origin "https://x-access-token:${DEPLOY_TOKEN}@github.com/m4elmelegy-hub/MUHKAM-ERP.git"
            git fetch origin main
            git reset --hard origin/main
            git clean -fd
            # Remove token from remote URL after pull (security hygiene)
            git remote set-url origin "https://github.com/m4elmelegy-hub/MUHKAM-ERP.git"

            pnpm install --frozen-lockfile

            # Push any new DB migrations (--force ensures new columns on existing tables are applied)
            cd "$APP_DIR/lib/db"
            pnpm run push-force

            cd "$APP_DIR/artifacts/erp-system"
            NODE_ENV=production BASE_PATH=/ VITE_API_URL="" pnpm run build

            cd "$APP_DIR/artifacts/api-server"
            pnpm run build

            if pm2 describe halaltech-api > /dev/null 2>&1; then
              pm2 restart halaltech-api --update-env
            else
              pm2 start dist/index.mjs --name halaltech-api --cwd "$APP_DIR/artifacts/api-server" --update-env
            fi
            pm2 save
            # التحقق من تشغيل Redis
            if ! redis-cli ping > /dev/null 2>&1; then
              echo "تحذير: Redis غير متاح — التطبيق سيعمل بدون cache"
            else
              echo "Redis يعمل بشكل صحيح"
            fi

            sudo cp "$APP_DIR/deploy/nginx.conf" /etc/nginx/sites-available/muhkam
            sudo nginx -t && sudo nginx -s reload

            sleep 8
            curl -sf http://localhost:8080/api/healthz
            echo "Deploy complete — halaltec.com is live"
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          command_timeout: 30s
          script: |
            RESPONSE=$(curl -sf http://localhost:8080/api/healthz)
            echo "OK — $RESPONSE — halaltec.com is live!"
