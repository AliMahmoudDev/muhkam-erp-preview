name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel previous runs on the same ref so only the latest commit is tested.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E (Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # PostgreSQL is required so the backend can start and process login requests.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: e2edb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      # pnpm must be set up before actions/setup-node so its cache is available.
      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build shared libraries
        # erp-system depends on @workspace/api-client-react; build it first.
        run: pnpm --filter @workspace/api-client-react build

      - name: Build frontend
        # VITE_API_URL="" means the SPA uses relative URLs (/api/…).
        # The Express server in production mode serves both the API and the SPA,
        # so both must share the same origin — no separate static-file server.
        run: pnpm --filter @workspace/erp-system build
        env:
          VITE_API_URL: ""

      - name: Build backend
        run: pnpm --filter @workspace/api-server build

      - name: Wait for Postgres
        run: |
          for i in {1..10}; do
            pg_isready -h localhost -p 5432 && break
            sleep 2
          done

      - name: Push database schema
        run: pnpm --filter @workspace/db run push-force
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/e2edb

      - name: Start backend
        # NODE_ENV=production activates the Express static-file middleware that
        # serves artifacts/erp-system/dist/public (set via FRONTEND_DIST).
        # This single server handles all Playwright requests — both REST API calls
        # (/api/*) and SPA page loads — eliminating cross-origin cookie issues
        # that arise when the frontend and API run on different ports.
        #
        # Tests that require real credentials already call test.skip() when
        # E2E_TEST_USER / E2E_TEST_PASS are absent, so only credential-free
        # tests run in this pipeline.
        run: |
          node artifacts/api-server/dist/index.mjs > /tmp/muhkam-e2e-server.log 2>&1 &
          echo "Waiting for server to be ready…"
          for i in {1..20}; do
            if curl -sf http://localhost:3000/api/healthz > /dev/null 2>&1; then
              echo "Server is ready"
              exit 0
            fi

            if ! kill -0 "$!" 2>/dev/null; then
              echo "::error::Backend process exited before becoming ready"
              cat /tmp/muhkam-e2e-server.log
              exit 1
            fi

            echo "  attempt $i/20 — retrying in 3 s"
            sleep 3
          done

          echo "::error::Backend did not become ready on http://localhost:3000"
          cat /tmp/muhkam-e2e-server.log
          exit 1
        env:
          DATABASE_URL:          postgresql://postgres:postgres@localhost:5432/e2edb
          JWT_SECRET:            e2e-ci-jwt-secret-minimum-32-characters!!
          JWT_REFRESH_SECRET:    e2e-ci-refresh-secret-minimum-32-chars!!
          TOTP_ENCRYPTION_KEY:   e2e-ci-totp-encryption-key-32-chars!!
          BACKUP_ENCRYPTION_KEY: e2e-ci-backup-encryption-key-32char
          NODE_ENV:              production
          PORT:                  3000
          FRONTEND_DIST:         ${{ github.workspace }}/artifacts/erp-system/dist/public

      - name: Run E2E tests
        run: pnpm test:e2e
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
