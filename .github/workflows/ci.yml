name: CI — Lint, Type Check, Test, Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  migration-safety-check:
    name: Migration SQL Safety Scan
    runs-on: self-hosted
    timeout-minutes: 2
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Scan migration SQL for dangerous statements
        run: |
          if [ ! -d "lib/db/drizzle" ]; then
            echo "No migration folder found — skipping scan"
            exit 0
          fi

          SQL_FILES=$(find lib/db/drizzle -maxdepth 1 -name "*.sql" -type f)
          if [ -z "$SQL_FILES" ]; then
            echo "No .sql files in lib/db/drizzle — skipping scan"
            exit 0
          fi

          DANGEROUS=""

          check_pattern() {
            local pattern="$1"
            local label="$2"
            local matches
            matches=$(grep -rn -E "$pattern" lib/db/drizzle/*.sql \
              | grep -v "^\s*--" \
              | grep -v "\-\-.*$pattern" || true)
            if [ -n "$matches" ]; then
              echo "::error::DANGEROUS SQL DETECTED — $label"
              echo "$matches"
              DANGEROUS="$DANGEROUS $label"
            fi
          }

          check_pattern "DROP TABLE"          "DROP_TABLE"
          check_pattern "DROP COLUMN"         "DROP_COLUMN"
          check_pattern "ALTER TABLE .* DROP"  "ALTER_TABLE_DROP"
          check_pattern "TRUNCATE"            "TRUNCATE"
          check_pattern "DELETE FROM"         "DELETE_FROM"

          if [ -n "$DANGEROUS" ]; then
            echo ""
            echo "FATAL: Dangerous SQL detected:$DANGEROUS"
            echo "If intentional, document the risk and request manual merge approval."
            exit 1
          fi

          echo "✅ No dangerous migration SQL detected"

  lint-typecheck:
    name: Lint & Type Check
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared libraries
        run: pnpm --filter @workspace/api-client-react build

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

  test-backend:
    name: Backend Tests
    runs-on: self-hosted
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Wait for DB
        run: |
          for i in {1..10}; do
            pg_isready -h localhost -p 5432 && break
            sleep 2
          done

      - name: Push database schema
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
        run: pnpm --filter @workspace/db run push-force

      - name: Run backend tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
          JWT_SECRET: ci-unit-test-jwt-secret-minimum-32chars!!
          JWT_REFRESH_SECRET: ci-unit-test-jwt-refresh-secret-min-32chars!!
          NODE_ENV: test
        run: pnpm --filter @workspace/api-server test

      - name: Check coverage (backend)
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
          JWT_SECRET: ci-unit-test-jwt-secret-minimum-32chars!!
          JWT_REFRESH_SECRET: ci-unit-test-jwt-refresh-secret-min-32chars!!
          NODE_ENV: test
        run: pnpm --filter @workspace/api-server test:coverage

  test-frontend:
    name: Frontend Tests
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared libraries
        run: pnpm --filter @workspace/api-client-react build

      - name: Run frontend tests
        run: pnpm --filter @workspace/erp-system test

      - name: Check coverage (frontend)
        run: pnpm --filter @workspace/erp-system test:coverage

  build:
    name: Build Check
    runs-on: self-hosted
    timeout-minutes: 15
    needs: [lint-typecheck, test-backend, test-frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
